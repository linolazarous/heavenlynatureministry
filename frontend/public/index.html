            /* Prevent FOUC */
            [data-loading] { display: none; }
            
            /* Basic layout styles */

                margin: 0;

                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            
            /* Loading state */
            #root:empty::before {
                content: '';
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 50px;
                height: 50px;
                border: 3px solid #f3f3f3;
                border-top: 3px solid #3498db;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            
            @keyframes spin {
                0% { transform: translate(-50%, -50%) rotate(0deg); }
                100% { transform: translate(-50%, -50%) rotate(360deg); }
            }

        <!-- Performance monitoring -->
        <script>
            // Performance monitoring
            if ('performance' in window) {
                window.addEventListener('load', function() {
                    setTimeout(function() {
                        var timing = performance.getEntriesByType('navigation')[0];
                        if (timing && window.posthog) {
                            posthog.capture('page_load', {
                                'domContentLoaded': timing.domContentLoadedEventEnd - timing.fetchStart,
                                'loadTime': timing.loadEventEnd - timing.fetchStart,
                                'firstContentfulPaint': performance.getEntriesByName('first-contentful-paint')[0]?.startTime || 0
                            });
                        }
                    }, 0);
                });
            }
            
            // Error tracking
            window.addEventListener('error', function(e) {
                if (window.posthog) {
                    posthog.capture('javascript_error', {
                        $current_url: window.location.href,
                        message: e.message,
                        filename: e.filename,
                        lineno: e.lineno,
                        colno: e.colno
                    });
                }
            });
            
            // Unhandled promise rejections
            window.addEventListener('unhandledrejection', function(e) {
                if (window.posthog) {
                    posthog.capture('unhandled_promise_rejection', {
                        $current_url: window.location.href,
                        reason: e.reason?.message || e.reason
                    });
                }
            });
